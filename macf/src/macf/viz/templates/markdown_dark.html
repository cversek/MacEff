<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>${title}</title>
<style>
  /* Homebrew dark theme — black bg, amber headings, green code */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000000;
    color: #b0b0b0;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 17px;
    line-height: 1.75;
    max-width: 820px;
    margin: 0 auto;
    padding: 48px 24px 96px;
  }

  /* Headings — amber warmth */
  h1 {
    color: #f0c040;
    font-size: 1.8em;
    border-bottom: 1px solid #333;
    padding-bottom: 12px;
    margin: 1.5em 0 0.8em;
  }
  h1:first-child { margin-top: 0; }

  h2 {
    color: #e0a830;
    font-size: 1.35em;
    margin: 2em 0 0.6em;
    border-bottom: 1px solid #222;
    padding-bottom: 6px;
  }

  h3 {
    color: #c89020;
    font-size: 1.1em;
    margin: 1.5em 0 0.4em;
  }

  h4, h5, h6 {
    color: #a07818;
    margin: 1.2em 0 0.3em;
  }

  /* Body text */
  p { margin: 0.8em 0; }

  /* Links — subtle cyan */
  a { color: #5cacee; text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Strong/emphasis */
  strong { color: #d0d0d0; }
  em { color: #c0c0b0; font-style: italic; }

  /* Code — green terminal glow */
  code {
    background: #151515;
    color: #4caf50;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 0.88em;
  }

  pre {
    background: #111;
    border: 1px solid #222;
    border-radius: 6px;
    padding: 16px 20px;
    overflow-x: auto;
    margin: 1em 0;
    line-height: 1.5;
  }
  pre code {
    background: none;
    padding: 0;
    font-size: 0.85em;
  }

  /* Block quotes — left bar accent */
  blockquote {
    border-left: 3px solid #f0c040;
    margin: 1em 0;
    padding: 0.5em 1.2em;
    background: #0f0f0f;
    color: #999;
  }
  blockquote p { margin: 0.4em 0; }

  /* Lists */
  ul, ol {
    margin: 0.6em 0;
    padding-left: 1.8em;
  }
  li { margin: 0.3em 0; }
  li > ul, li > ol { margin: 0.2em 0; }

  /* Tables */
  table {
    border-collapse: collapse;
    width: 100%;
    margin: 1em 0;
  }
  th {
    background: #151515;
    color: #f0c040;
    text-align: left;
    padding: 8px 12px;
    border: 1px solid #333;
    font-size: 0.92em;
  }
  td {
    padding: 8px 12px;
    border: 1px solid #222;
  }
  tr:nth-child(even) td { background: #0d0d0d; }

  /* Horizontal rules — subtle divider */
  hr {
    border: none;
    border-top: 1px solid #222;
    margin: 2em 0;
  }

  /* Images */
  img { max-width: 100%; border-radius: 4px; }

  /* Header metadata block (bold lines at top of CAs) */
  p > strong:first-child {
    color: #c89020;
  }

  /* Footer timestamp */
  .footer {
    margin-top: 4em;
    padding-top: 1em;
    border-top: 1px solid #222;
    color: #555;
    font-size: 0.8em;
    font-family: 'SF Mono', monospace;
  }

  /* Print-friendly */
  @media print {
    body { background: white; color: #222; max-width: 100%; }
    h1, h2, h3 { color: #333; }
    code { background: #f0f0f0; color: #333; }
    pre { background: #f5f5f5; border-color: #ddd; }
    pre code { color: #333; }
    a { color: #0066cc; }
    .footer { color: #999; }
  }
</style>
</head>
<body>

${content}

<div class="footer">
  Rendered by macf_tools markdown present &middot; ${timestamp}
</div>

</body>
</html>
