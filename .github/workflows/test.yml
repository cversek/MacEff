name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: macf/pyproject.toml

      - name: Install package with test dependencies
        run: pip install -e "./macf[test]"

      - name: Create CI environment directories
        run: mkdir -p ~/.claude/projects

      - name: Run tests
        run: >
          pytest macf/tests/ -v --tb=short
          --ignore=macf/tests/test_recommend.py
          --ignore=macf/tests/test_hybrid_search.py
          --ignore=macf/tests/test_lancedb_search.py
          --ignore=macf/tests/test_search_service.py
          --ignore=macf/tests/test_env_cli.py
          --ignore=macf/tests/test_get_token_info.py
          --ignore=macf/tests/test_handle_session_start.py
        timeout-minutes: 3
